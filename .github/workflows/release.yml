name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (patch | minor | major)'
        required: false
        default: 'patch'

permissions:
  contents: write

jobs:
  version-bump:
    name: Auto-bump patch version
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(release):')
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and push tag
        id: bump
        env:
          BUMP: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          npm version "$BUMP" --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          TAG="v${NEW_VERSION}"
          git add package.json package-lock.json
          git commit -m "chore(release): ${TAG} [skip ci]"
          git tag "$TAG"
          git push origin HEAD:main
          git push origin "$TAG"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build-macos:
    name: macOS (signed + notarized DMG)
    needs: version-bump
    if: |
      always() &&
      (needs.version-bump.result == 'success' ||
       (needs.version-bump.result == 'skipped' && startsWith(github.ref, 'refs/tags/v')))
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.tag || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build whisper-cli (darwin-arm64)
        run: bash scripts/build-whisper.sh

      - name: Decode Apple ASC API key (.p8)
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          P8_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$P8_PATH"
          chmod 600 "$P8_PATH"
          echo "APPLE_API_KEY=$P8_PATH" >> "$GITHUB_ENV"

      - name: Build, sign, notarize and publish (macOS arm64)
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npx electron-builder --mac --arm64 --publish always

  build-windows:
    name: Windows (unsigned NSIS)
    needs: version-bump
    if: |
      always() &&
      (needs.version-bump.result == 'success' ||
       (needs.version-bump.result == 'skipped' && startsWith(github.ref, 'refs/tags/v')))
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.tag || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build whisper-cli (win32-x64)
        shell: pwsh
        run: pwsh -File scripts/build-whisper.ps1

      - name: Build and publish (Windows x64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npx electron-builder --win --x64 --publish always

  build-linux:
    name: Linux (AppImage)
    needs: version-bump
    if: |
      always() &&
      (needs.version-bump.result == 'success' ||
       (needs.version-bump.result == 'skipped' && startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.tag || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install X11 build dependencies (for uiohook-napi)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxtst-dev \
            libxt-dev \
            libxinerama-dev \
            libxkbfile-dev \
            libxrandr-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-xcb-dev \
            cmake \
            build-essential

      - name: Install dependencies
        run: npm ci

      - name: Build whisper-cli (linux-x64)
        run: bash scripts/build-whisper.sh

      - name: Build and publish (Linux x64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npx electron-builder --linux --x64 --publish always
